version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: agr1_app
    container_name: agr1_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - mysql
    command: ["sh","/var/www/html/docker-entrypoint.sh"]

  mysql:
    image: mysql:8.0
    container_name: agr1_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: agr1
      MYSQL_USER: agr1user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
